<!DOCTYPE html>
<html>
<head>
  <title>Supabase Login Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      font-family:Arial;
      background:#f0f0f0;
    }
    #loginDiv{
      background:white;
      padding:30px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      display:flex;
      flex-direction:column;
      gap:10px;
      width:300px;
    }
    input{
      padding:8px;
    }
    button{
      background:#4747ff;
      color:white;
      padding:10px;
      border-radius:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>
  <div id="loginDiv">
    <h2>Welcome back</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="signup">Sign Up</button>
    <button id="login">Login</button>
  </div>

  <script>
    const supabaseUrl = "https://hanegddroiudmcaezaxj.supabase.co";
    const supabaseKey = "sb_publishable_iaG8Lm7N_hwXyrHPTTfH6w_kUkISgbH";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById("signup").addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      console.log("Signup clicked", {email, password});

      if(!email || !password){
        console.log("Missing email or password");
        alert("Please enter both email and password.");
        return;
      }

      try {
        const { data, error } = await supabase.auth.signUp({ email, password });
        console.log("Supabase response:", data, error);

        if(error){
          alert("Signup failed: " + error.message);
          console.error("Signup error:", error);
        } else {
          alert("Signup successful!");
          console.log("User created:", data);
        }
      } catch(err){
        alert("Unexpected error during signup.");
        console.error(err);
      }
    });

    document.getElementById("login").addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      console.log("Login clicked", {email, password});

      if(!email || !password){
        console.log("Missing email or password");
        alert("Please enter both email and password.");
        return;
      }

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        console.log("Supabase login response:", data, error);

        if(error){
          alert("Login failed: " + error.message);
          console.error("Login error:", error);
        } else {
          alert("Login successful!");
          console.log("User logged in:", data);
        }
      } catch(err){
        alert("Unexpected error during login.");
        console.error(err);
      }
    });
  </script>
</body>
</html>
