<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supabase Auto Sign Up</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body {
    display:flex; justify-content:center; align-items:center; height:100vh;
    margin:0; font-family:Arial; background:#f0f0f0;
  }
  #messageDiv {
    background:white; padding:30px; border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    width:350px; text-align:center; font-size:16px;
  }
  .success { color:green; font-weight:bold; }
  .error { color:red; font-weight:bold; }
</style>
</head>
<body>

<div id="messageDiv">Signing up...</div>

<script>
  const supabaseUrl = "https://hanegddroiudmcaezaxj.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhbmVnZGRyb2l1ZG1jYWV6YXhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDg3ODIsImV4cCI6MjA4ODM4NDc4Mn0.-A7axn1lIHEd4lEv4oxNx8AWevr1ZZnRsAnGujaYys8";
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const email = "sultan.awad.w@gmail.com";  // CHANGE to your desired email
  const password = "Test1234!";           // CHANGE to a strong password
  const messageDiv = document.getElementById("messageDiv");

  async function autoSignUp() {
    try {
      const { data, error } = await supabase.auth.signUp({ email, password });

      if(error){
        messageDiv.textContent = "Sign up failed: " + error.message;
        messageDiv.className = "error";
      } else {
        messageDiv.textContent = "Sign up successful! Check your email to confirm.";
        messageDiv.className = "success";
      }

      console.log("Supabase response:", data, error);
    } catch(err) {
      messageDiv.textContent = "Unexpected error: " + err.message;
      messageDiv.className = "error";
      console.error(err);
    }
  }

  autoSignUp();
</script>

</body>
</html>
