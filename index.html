<!DOCTYPE html>
<html>
<head>
<title>Supabase Login Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  background:#f0f0f0;
}

#loginDiv{
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
  gap:10px;
  width:300px;
}

input{
  padding:8px;
  width:100%;
  box-sizing:border-box;
}

button{
  background:#4747ff;
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:disabled{
  background:#888;
}

#message{
  font-weight:bold;
  min-height:20px;
}
</style>
</head>

<body>

<div id="loginDiv">
<h2>Welcome back</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="signup">Sign Up</button>
<button id="login">Login</button>

<div id="message">Page loaded.</div>
</div>

<script>

const messageDiv = document.getElementById("message")

function showMessage(msg,color="black"){
  messageDiv.textContent = msg
  messageDiv.style.color = color
}

showMessage("JavaScript started")

const supabaseUrl = "https://hanegddroiudmcaezaxj.supabase.co"
const supabaseKey = "sb_publishable_iaG8Lm7N_hwXyrHPTTfH6w_kUkISgbH"
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

const signupBtn = document.getElementById("signup")
const loginBtn = document.getElementById("login")

signupBtn.onclick = async function(){

  showMessage("Signup button clicked")

  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  if(!email || !password){
    showMessage("Enter email and password","red")
    return
  }

  signupBtn.disabled = true
  signupBtn.textContent = "Signing up..."

  try{

    showMessage("Contacting Supabase...")

    const {data,error} = await supabase.auth.signUp({
      email:email,
      password:password
    })

    if(error){
      showMessage("Signup failed: "+error.message,"red")
    }else{
      showMessage("Signup success!","green")
    }

  }catch(err){
    showMessage("Unexpected error","red")
  }

  signupBtn.disabled = false
  signupBtn.textContent = "Sign Up"

}

loginBtn.onclick = async function(){

  showMessage("Login button clicked")

  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  if(!email || !password){
    showMessage("Enter email and password","red")
    return
  }

  loginBtn.disabled = true
  loginBtn.textContent = "Signing in..."

  try{

    showMessage("Contacting Supabase...")

    const {data,error} = await supabase.auth.signInWithPassword({
      email:email,
      password:password
    })

    if(error){
      showMessage("Login failed: "+error.message,"red")
    }else{
      showMessage("Login success!","green")
    }

  }catch(err){
    showMessage("Unexpected error","red")
  }

  loginBtn.disabled = false
  loginBtn.textContent = "Login"

}

</script>

</body>
</html>
