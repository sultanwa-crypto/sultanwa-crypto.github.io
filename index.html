<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Sultanwa Crypto</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    #loginDiv {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 320px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    input {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #667eea;
      outline: none;
    }

    button {
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
    }

    #signup {
      background: #6c63ff;
    }

    #login {
      background: #4747ff;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      opacity: 0.9;
    }

    #message {
      text-align: center;
      font-size: 14px;
      color: #d33;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div id="loginDiv">
    <h2>Welcome back</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="signup">Sign Up</button>
    <button id="login">Login</button>
    <p id="message"></p>
  </div>

  <script>
    // Supabase setup
    const supabaseUrl = "https://hanegddroiudmcaezaxj.supabase.co";
    const supabaseKey = "sb_publishable_iaG8Lm7N_hwXyrHPTTfH6w_kUkISgbH";
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const signupBtn = document.getElementById("signup");
    const loginBtn = document.getElementById("login");
    const msg = document.getElementById("message");

    async function handleAuth(action) {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if(!email || !password){
        msg.textContent = "Please enter both email and password.";
        return;
      }

      // Disable buttons and show progress
      signupBtn.disabled = true;
      loginBtn.disabled = true;
      if(action === "signup") signupBtn.textContent = "Signing up...";
      if(action === "login") loginBtn.textContent = "Signing in...";
      msg.textContent = "";

      try {
        let response;
        if(action === "signup") {
          response = await supabase.auth.signUp({ email, password });
        } else {
          response = await supabase.auth.signInWithPassword({ email, password });
        }

        console.log("Supabase response:", response);

        if(response.error){
          msg.textContent = response.error.message;
        } else {
          msg.style.color = "#28a745";
          msg.textContent = action === "signup" ? "Signup successful!" : "Login successful!";
        }

      } catch(err){
        console.error(err);
        msg.textContent = "Unexpected error occurred.";
      }

      // Re-enable buttons and reset text
      signupBtn.disabled = false;
      loginBtn.disabled = false;
      signupBtn.textContent = "Sign Up";
      loginBtn.textContent = "Login";
    }

    signupBtn.addEventListener("click", () => handleAuth("signup"));
    loginBtn.addEventListener("click", () => handleAuth("login"));
  </script>
</body>
</html>
