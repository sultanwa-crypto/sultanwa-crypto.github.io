<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supabase Login Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }
    #loginDiv {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 320px;
    }
    input {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: #4747ff;
      transition: all 0.2s;
    }
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div id="loginDiv">
  <h2>Supabase Login Test</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="signup">Sign Up</button>
  <button id="login">Login</button>
</div>

<script>
  // Replace these with your project info
  const supabaseUrl = "https://hanegddroiudmcaezaxj.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhbmVnZGRyb2l1ZG1jYWV6YXhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDg3ODIsImV4cCI6MjA4ODM4NDc4Mn0.-A7axn1lIHEd4lEv4oxNx8AWevr1ZZnRsAnGujaYys8";

  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const signupBtn = document.getElementById("signup");
  const loginBtn = document.getElementById("login");

  async function handleAuth(action) {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if(!email || !password){
      alert("Please enter both email and password.");
      return;
    }

    // Disable buttons while request is running
    signupBtn.disabled = true;
    loginBtn.disabled = true;
    if(action==="signup") signupBtn.textContent = "Signing up...";
    if(action==="login") loginBtn.textContent = "Signing in...";

    try {
      let res;
      if(action==="signup"){
        res = await supabase.auth.signUp({email, password});
      } else {
        res = await supabase.auth.signInWithPassword({email, password});
      }

      // Show full response in alert
      alert("Supabase response:\n" + JSON.stringify(res, null, 2));

    } catch(err){
      alert("Unexpected error:\n" + err.message);
    }

    // Re-enable buttons and reset text
    signupBtn.disabled = false;
    loginBtn.disabled = false;
    signupBtn.textContent = "Sign Up";
    loginBtn.textContent = "Login";
  }

  signupBtn.addEventListener("click", ()=> handleAuth("signup"));
  loginBtn.addEventListener("click", ()=> handleAuth("login"));
</script>

</body>
</html>
