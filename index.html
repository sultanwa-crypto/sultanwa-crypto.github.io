<!DOCTYPE html>
<html>
<head>
<title>Supabase Add User</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Add User</h2>

<input id="username" placeholder="username">
<input id="password" type="password" placeholder="password">
<button onclick="addUser()">Add User</button>

<p id="status"></p>

<script>
const SUPABASE_URL = "https://uhkoictzfseglnxbtkdw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoa29pY3R6ZnNlZ2xueGJ0ZGt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTUyMTQsImV4cCI6MjA4ODY5MTIxNH0.-gVsWi4gdkN3SXid7iiVkncCX8_imrSHlD9HZ0T8ghA";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function addUser() {

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

document.getElementById("status").innerText = "Sending...";

const { data, error } = await client
.from("Users-and-passwords")
.insert([
{
username: username,
password: password,
created_at: new Date().toISOString()
}
]);

if (error) {
document.getElementById("status").innerText = "Error: " + error.message;
} else {
document.getElementById("status").innerText = "User added successfully!";
}

}
</script>

</body>
</html>
