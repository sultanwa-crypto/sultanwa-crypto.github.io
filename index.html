<!DOCTYPE html>
<html>
<head>
<title>Supabase Login Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  background:#f0f0f0;
}

#loginDiv{
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
  gap:10px;
  width:300px;
}

input{
  padding:8px;
  width:100%;
  box-sizing:border-box;
}

button{
  background:#4747ff;
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:disabled{
  background:#888;
  cursor:not-allowed;
}

#message{
  font-weight:bold;
  min-height:20px;
}
</style>
</head>

<body>

<div id="loginDiv">
<h2>Welcome back</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="signup">Sign Up</button>
<button id="login">Login</button>

<div id="message"></div>
</div>

<script>

const supabaseUrl = "https://hanegddroiudmcaezaxj.supabase.co"
const supabaseKey = "sb_publishable_iaG8Lm7N_hwXyrHPTTfH6w_kUkISgbH"
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

const signupBtn = document.getElementById("signup")
const loginBtn = document.getElementById("login")
const messageDiv = document.getElementById("message")

function showMessage(msg, success=false){
  messageDiv.textContent = msg
  messageDiv.style.color = success ? "green" : "red"
}

async function performAuth(action){

  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  if(!email || !password){
    showMessage("Please enter both email and password.")
    return
  }

  signupBtn.disabled = true
  loginBtn.disabled = true

  if(action === "signup"){
    signupBtn.textContent = "Signing up..."
  } else {
    loginBtn.textContent = "Signing in..."
  }

  try{

    let result

    if(action === "signup"){
      result = await supabase.auth.signUp({email, password})
    } else {
      result = await supabase.auth.signInWithPassword({email, password})
    }

    const {data, error} = result

    if(error){
      showMessage(action + " failed: " + error.message)
    } else {
      showMessage(action + " successful!", true)
      document.getElementById("email").value = ""
      document.getElementById("password").value = ""
    }

  } catch(err){
    showMessage("Unexpected error.")
  }

  signupBtn.disabled = false
  loginBtn.disabled = false

  signupBtn.textContent = "Sign Up"
  loginBtn.textContent = "Login"
}

signupBtn.addEventListener("click", ()=>performAuth("signup"))
loginBtn.addEventListener("click", ()=>performAuth("login"))

</script>

</body>
</html>
