<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Sultan's Project</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .login-container {
    background: #fff;
    padding: 40px 30px;
    border-radius: 10px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    width: 350px;
    text-align: center;
  }

  .login-container h2 {
    margin-bottom: 25px;
    color: #333;
  }

  .login-container input {
    width: 100%;
    padding: 12px 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }

  .login-container button {
    width: 100%;
    padding: 12px;
    background: #0077ff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
  }

  .login-container button:hover {
    background: #005fcc;
  }

  .status {
    margin-top: 15px;
    color: red;
    font-size: 14px;
    min-height: 20px;
  }

  .signup-text {
    margin-top: 20px;
    font-size: 13px;
    color: #555;
  }

  .signup-text a {
    color: #0077ff;
    text-decoration: none;
  }

  .signup-text a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="login-container">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="loginUser()">Login</button>
  <p class="status" id="status"></p>
  <p class="login-text">Already have an account? <a href="login.html">Login!</a></p>
<script>
const SUPABASE_URL = "https://uhkoictzfseglnxbtdkw.supabase.co";
const SUPABASE_KEY = "sb_publishable_-PUjgfccR3jtZcLLIyVz0w_ZL8966QQ";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loginUser() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const status = document.getElementById("status");

  if (!username || !password) {
    status.innerText = "Please enter both fields.";
    return;
  }

  status.innerText = "Checking credentials...";

  // Query Supabase table for matching username and password
  const { data, error } = await client
    .from("Users-and-passwords")
    .select("*")
    .eq("username", username)
    .eq("password", password)
    .limit(1);

  if (error) {
    status.innerText = "Error: " + error.message;
  } else if (data.length === 0) {
    status.innerText = "Invalid username or password.";
  } else {
    status.innerText = "Login successful! Redirecting...";
    // Example: redirect to a welcome page
    setTimeout(() => {
      window.location.href = "welcome.html";
    }, 1000);
  }
}
</script>

</body>
</html>
